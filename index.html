<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pet the Dog</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1b1d24">
<style>
  :root {
    --bg: #1b1d24;
    --panel: #24272f;
    --text: #ececf1;
    --muted: #8b8f9a;
    --accent: #ffd166;
    --good: #78e08f;
    --bad: #ff6b6b;
    --warn: #ffb347;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex; flex-direction: column;
    height: 100dvh;
    max-width: 640px;
    margin: 0 auto;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid #333640;
    gap: 12px;
  }
  .stat { display: flex; flex-direction: column; line-height: 1.1; }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat .value { font-size: 20px; font-weight: 700; }
  #mood {
    display: flex; gap: 2px; font-size: 18px; color: var(--bad);
  }
  #mute {
    background: transparent; border: 1px solid #3a3d47; color: var(--text);
    border-radius: 6px; padding: 6px 10px; font-size: 16px; cursor: pointer;
  }
  #mute:active { background: #2e3139; }

  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  .dog-wrap {
    touch-action: none;
    width: min(80vw, 420px);
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 24px;
    background: var(--panel);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    cursor: grab;
    transition: transform 150ms ease, box-shadow 200ms ease, filter 400ms ease;
    overflow: hidden;
    position: relative;
  }
  .dog-wrap:active { cursor: grabbing; }
  .dog-wrap.pet-pulse { transform: scale(1.03); }
  .dog-wrap.bad-pulse { box-shadow: 0 0 0 4px var(--bad), 0 8px 24px rgba(0,0,0,0.35); }
  .dog-wrap.shake { animation: shake 400ms ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15% { transform: translateX(-14px) rotate(-3deg); }
    30% { transform: translateX(12px) rotate(3deg); }
    45% { transform: translateX(-10px) rotate(-2deg); }
    60% { transform: translateX(8px) rotate(2deg); }
    80% { transform: translateX(-4px); }
  }
  .dog-img {
    width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
    -webkit-user-drag: none;
    user-select: none;
  }
  .dog-emoji {
    font-size: clamp(120px, 40vw, 260px);
    line-height: 1;
    pointer-events: none;
  }

  #feedback {
    min-height: 56px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600;
    padding: 8px 16px;
    text-align: center;
    color: var(--muted);
  }
  #feedback.good { color: var(--good); }
  #feedback.bad { color: var(--bad); }
  #feedback.warn { color: var(--warn); }

  #overlay {
    position: fixed; inset: 0;
    background: rgba(10,11,15,0.85);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    z-index: 10;
    opacity: 0;
    transition: opacity 300ms ease;
  }
  #overlay.visible { display: flex; opacity: 1; }
  #overlay h1 { margin: 0; font-size: 42px; color: var(--bad); letter-spacing: 0.05em; }
  #overlay p { margin: 0; color: var(--muted); text-align: center; max-width: 80vw; }
  #overlay .final-score { font-size: 32px; color: var(--accent); font-weight: 700; }
  #overlay .best { font-size: 14px; color: var(--muted); }
  #overlay button {
    margin-top: 8px;
    background: var(--accent); color: #1b1d24;
    border: none; border-radius: 10px;
    padding: 14px 28px; font-size: 18px; font-weight: 700;
    cursor: pointer;
  }
  #overlay button:active { transform: translateY(1px); }

  .hidden { display: none !important; }

  footer {
    padding: 8px 16px 14px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }

  /* ───── Tail + Sad overlays ───── */
  .overlay {
    position: absolute;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: opacity 300ms ease;
  }
  #tail {
    left: calc(var(--tail-x, 0.80) * 100%);
    top:  calc(var(--tail-y, 0.65) * 100%);
    width: 80px; height: 80px;
    color: var(--accent);
    opacity: 0;
  }
  .dog-wrap.petting #tail { opacity: 1; }
  .tail-inner {
    width: 100%; height: 100%;
    transform-origin: 50% 100%;   /* pivot at bottom-center of box */
  }
  .dog-wrap.petting .tail-inner {
    animation: wag 350ms ease-in-out infinite;
  }
  /* Freeze the tail during calibration so it's easy to position */
  .dog-wrap.calibrating #tail { opacity: 1; }
  .dog-wrap.calibrating .tail-inner { animation: none; }
  /* Hide overlays when game-over, unless calibrating */
  .dog-wrap.game-over:not(.calibrating) #tail { opacity: 0; }
  .dog-wrap.game-over:not(.calibrating) .tail-inner { animation: none; }
  .tail-svg, .tail-img { width: 100%; height: 100%; display: block; }
  .tail-img { object-fit: contain; }
  @keyframes wag {
    0%, 100% { transform: rotate(-30deg); }
    50%      { transform: rotate( 30deg); }
  }

  /* ───── Calibration mode ───── */
  #calib-btn {
    background: transparent; border: 1px solid #3a3d47; color: var(--text);
    border-radius: 6px; padding: 6px 10px; font-size: 16px; cursor: pointer;
  }
  #calib-btn:active, #calib-btn.active { background: var(--accent); color: #1b1d24; border-color: var(--accent); }

  .dog-wrap.calibrating { cursor: default; }
  .dog-wrap.calibrating .dog-img { filter: brightness(0.75); }

  .calib-marker {
    position: absolute;
    transform: translate(-50%, -50%);
    background: rgba(255, 209, 102, 0.96); color: #1b1d24;
    border: 2px solid #1b1d24; border-radius: 999px;
    padding: 10px 14px; font-weight: 700; font-size: 13px;
    touch-action: none; cursor: grab;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    z-index: 5;
    white-space: nowrap;
    pointer-events: auto;
  }
  .calib-marker:active { cursor: grabbing; }
  #calib-tail { left: calc(var(--tail-x, 0.80) * 100%); top: calc(var(--tail-y, 0.65) * 100%); }

  #calib-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
    background: var(--panel); border-top: 1px solid #333640;
    display: none; gap: 8px; justify-content: center; z-index: 20;
  }
  #calib-bar.visible { display: flex; }
  #calib-bar button {
    padding: 10px 18px; border-radius: 8px; font-weight: 700;
    font-size: 15px; border: none; cursor: pointer;
  }
  #calib-bar .save { background: var(--good); color: #1b1d24; }
  #calib-bar .reset { background: #3a3d47; color: var(--text); }
  #calib-bar .cancel { background: var(--bad); color: #1b1d24; }

  #calib-hint {
    position: fixed; left: 0; right: 0; top: 68px;
    text-align: center; font-size: 13px; color: var(--muted);
    display: none; z-index: 20; padding: 0 16px;
  }
  #calib-hint.visible { display: block; }
</style>
</head>
<body>
  <header>
    <div class="stat"><span class="label">Score</span><span class="value" id="score">0</span></div>
    <div class="stat"><span class="label">Best</span><span class="value" id="best">0</span></div>
    <div class="stat"><span class="label">Mood</span><span class="value" id="mood">♥♥♥♥♥</span></div>
    <button id="mute" aria-label="Toggle sound">🔊</button>
    <button id="calib-btn" aria-label="Calibrate tail and face positions">⚙</button>
  </header>

  <main>
    <div id="dog-wrap" class="dog-wrap" aria-label="Pet the dog. Press and drag across the dog.">
      <img id="dog" class="dog-img" src="assets/dog.jpg" alt="dog">
      <img id="dog-bite-preload" src="assets/dog-bite.jpg" hidden>
      <img id="dog-growl-preload" src="assets/dog-growl.jpg" hidden>

      <div class="overlay" id="tail">
        <div class="tail-inner">
          <img class="tail-img" src="assets/tail.png" alt="" hidden>
          <svg class="tail-svg" viewBox="0 0 60 60" aria-hidden="true">
            <path d="M30,60 Q30,25 55,8" stroke="currentColor" stroke-width="10"
                  stroke-linecap="round" fill="none"/>
          </svg>
        </div>
      </div>

      <div class="calib-marker" id="calib-tail" hidden>🌀 tail</div>
    </div>
  </main>

  <div id="calib-hint">Drag the marker onto your dog's tail, then Save.</div>
  <div id="calib-bar">
    <button class="reset" id="calib-reset">Reset</button>
    <button class="cancel" id="calib-cancel">Cancel</button>
    <button class="save" id="calib-save">Save</button>
  </div>

  <div id="feedback">Press and drag across the dog to pet.</div>

  <footer>Drag slow = boring. Drag medium = happy dog. Drag fast or stop petting = bite!</footer>

  <div id="overlay" role="dialog" aria-modal="true">
    <h1 id="overlay-title">BITTEN!</h1>
    <p id="overlay-reason"></p>
    <div class="final-score">Score: <span id="final-score">0</span></div>
    <div class="best">Best: <span id="overlay-best">0</span></div>
    <button id="play-again">Play Again</button>
  </div>

  <audio id="pet-loop" src="assets/pet-loop.mp3" loop preload="auto"></audio>
  <audio id="bite-sfx" src="assets/bite.mp3" preload="auto"></audio>
  <audio id="growl-sfx" src="assets/growl.mp3" loop preload="auto"></audio>

<script>
// ──────────────────────────── Tunables ────────────────────────────
const SPEED_BANDS = [
  { max: 100,      points: 1,  bite: 0.00, label: "too slow",      tone: "warn" },
  { max: 300,      points: 3,  bite: 0.00, label: "gentle pet",    tone: "good" },
  { max: 800,      points: 10, bite: 0.00, label: "nice pet!",     tone: "good" },
  { max: 1500,     points: 6,  bite: 0.10, label: "a bit fast",    tone: "warn" },
  { max: Infinity, points: 2,  bite: 0.55, label: "TOO FAST!",     tone: "bad"  },
];
const MOOD_START = 50;
const MOOD_MIN = 0, MOOD_MAX = 100;
const PEAK_FRANTIC = 2000;
const BITE_MOOD_FACTOR = 1.5;
const IDLE_WARN_MS = 3000;
const IDLE_BITE_MS = 6000;
const PET_LOOP_FADE_MS = 250;
const PET_LOOP_GRACE_MS = 600;
const PET_LOOP_VOLUME = 0.4;
const BITE_VOLUME = 0.85;
const BITE_HOLD_MS = 1800; // how long the bite image lingers before the score overlay
const TAIL_GRACE_MS = 600;               // keep tail wagging this long after last stroke
const GROWL_VOLUME = 0.7;                // volume for idle growl loop
const CALIB_DEFAULTS = { tailX: 0.80, tailY: 0.65 };

// ──────────────────────────── Elements ────────────────────────────
const dogWrap = document.getElementById("dog-wrap");
const dogImg = document.getElementById("dog");
const dogBitePreload = document.getElementById("dog-bite-preload");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const moodEl = document.getElementById("mood");
const feedbackEl = document.getElementById("feedback");
const overlay = document.getElementById("overlay");
const overlayTitle = document.getElementById("overlay-title");
const overlayReason = document.getElementById("overlay-reason");
const finalScoreEl = document.getElementById("final-score");
const overlayBestEl = document.getElementById("overlay-best");
const playAgainBtn = document.getElementById("play-again");
const muteBtn = document.getElementById("mute");
const petLoopEl = document.getElementById("pet-loop");
const biteSfxEl = document.getElementById("bite-sfx");
const tailEl = document.getElementById("tail");
const tailPngEl = tailEl.querySelector(".tail-img");
const tailSvgEl = tailEl.querySelector(".tail-svg");
const dogGrowlPreload = document.getElementById("dog-growl-preload");
const growlSfxEl = document.getElementById("growl-sfx");
const calibBtn = document.getElementById("calib-btn");
const calibTailMarker = document.getElementById("calib-tail");
const calibBar = document.getElementById("calib-bar");
const calibHint = document.getElementById("calib-hint");
const calibSaveBtn = document.getElementById("calib-save");
const calibCancelBtn = document.getElementById("calib-cancel");
const calibResetBtn = document.getElementById("calib-reset");

// ──────────────────────────── Asset fallbacks ────────────────────
function useEmojiFallback(imgEl, emoji) {
  const span = document.createElement("div");
  span.className = "dog-emoji";
  span.textContent = emoji;
  imgEl.replaceWith(span);
  return span;
}
let dogEl = dogImg;
const dogBiteSrc = dogBitePreload.src;
const dogGrowlSrc = dogGrowlPreload.src;
const dogHappySrc = dogImg.src;
let dogBiteAvailable = true;
let dogGrowlAvailable = true;
let dogHappyAvailable = true;

function markHappyMissing() {
  if (!dogHappyAvailable) return;
  dogHappyAvailable = false;
  dogEl = useEmojiFallback(dogImg, "🐕");
}
function markBiteMissing()  { dogBiteAvailable = false; }
function markGrowlMissing() { dogGrowlAvailable = false; }

dogImg.addEventListener("error", markHappyMissing, { once: true });
dogBitePreload.addEventListener("error", markBiteMissing, { once: true });
dogGrowlPreload.addEventListener("error", markGrowlMissing, { once: true });
// Handle the race where error already fired before this script ran.
if (dogImg.complete && dogImg.naturalWidth === 0) markHappyMissing();
if (dogBitePreload.complete && dogBitePreload.naturalWidth === 0) markBiteMissing();
if (dogGrowlPreload.complete && dogGrowlPreload.naturalWidth === 0) markGrowlMissing();

// Optional PNG overrides for tail (fall back to inline SVG).
function activatePng(pngEl, defaultEl) {
  pngEl.hidden = false;
  defaultEl.hidden = true;
}
function wireOverlayPng(pngEl, defaultEl) {
  pngEl.addEventListener("load", () => activatePng(pngEl, defaultEl), { once: true });
  pngEl.addEventListener("error", () => { /* keep default visible */ }, { once: true });
  if (pngEl.complete && pngEl.naturalWidth > 0) activatePng(pngEl, defaultEl);
}
wireOverlayPng(tailPngEl, tailSvgEl);

// ──────────────────────────── Audio ────────────────────────────
let audioEnabled = { pet: true, bite: true, growl: true };
let muted = localStorage.getItem("dogNut.muted") === "1";
petLoopEl.volume = PET_LOOP_VOLUME;
biteSfxEl.volume = BITE_VOLUME;
growlSfxEl.volume = GROWL_VOLUME;
petLoopEl.addEventListener("error", () => { audioEnabled.pet = false; }, { once: true });
biteSfxEl.addEventListener("error", () => { audioEnabled.bite = false; }, { once: true });
growlSfxEl.addEventListener("error", () => { audioEnabled.growl = false; }, { once: true });
// If the error event already fired before this script ran:
if (petLoopEl.error) audioEnabled.pet = false;
if (biteSfxEl.error) audioEnabled.bite = false;
if (growlSfxEl.error) audioEnabled.growl = false;

function updateMuteButton() {
  muteBtn.textContent = muted ? "🔇" : "🔊";
  petLoopEl.muted = muted;
  biteSfxEl.muted = muted;
  growlSfxEl.muted = muted;
}
muteBtn.addEventListener("click", () => {
  muted = !muted;
  localStorage.setItem("dogNut.muted", muted ? "1" : "0");
  updateMuteButton();
});
updateMuteButton();

let petLoopFadeTimer = null;
let petLoopStopTimer = null;
function startPetLoop() {
  if (!audioEnabled.pet || muted) return;
  clearTimeout(petLoopStopTimer); petLoopStopTimer = null;
  if (petLoopFadeTimer) { clearInterval(petLoopFadeTimer); petLoopFadeTimer = null; }
  petLoopEl.volume = PET_LOOP_VOLUME;
  if (petLoopEl.paused) petLoopEl.play().catch(() => {});
}
function scheduleStopPetLoop() {
  if (!audioEnabled.pet) return;
  clearTimeout(petLoopStopTimer);
  petLoopStopTimer = setTimeout(() => {
    const step = 50;
    const fadeSteps = Math.max(1, Math.floor(PET_LOOP_FADE_MS / step));
    const delta = PET_LOOP_VOLUME / fadeSteps;
    petLoopFadeTimer = setInterval(() => {
      petLoopEl.volume = Math.max(0, petLoopEl.volume - delta);
      if (petLoopEl.volume <= 0.01) {
        clearInterval(petLoopFadeTimer); petLoopFadeTimer = null;
        petLoopEl.pause();
        petLoopEl.currentTime = 0;
        petLoopEl.volume = PET_LOOP_VOLUME;
      }
    }, step);
  }, PET_LOOP_GRACE_MS);
}
function hardStopPetLoop() {
  clearTimeout(petLoopStopTimer); petLoopStopTimer = null;
  if (petLoopFadeTimer) { clearInterval(petLoopFadeTimer); petLoopFadeTimer = null; }
  petLoopEl.pause();
  petLoopEl.currentTime = 0;
  petLoopEl.volume = PET_LOOP_VOLUME;
}
function playBiteSfx() {
  if (!audioEnabled.bite || muted) return;
  biteSfxEl.currentTime = 0;
  biteSfxEl.play().catch(() => {});
}
function startGrowl() {
  if (!audioEnabled.growl || muted) return;
  if (growlSfxEl.paused) growlSfxEl.play().catch(() => {});
}
function hardStopGrowl() {
  growlSfxEl.pause();
  growlSfxEl.currentTime = 0;
}

// ──────────────────────────── Calibration ──────────────────────
function loadCalibration() {
  try {
    const raw = JSON.parse(localStorage.getItem("dogNut.calib"));
    if (raw && typeof raw === "object") return { ...CALIB_DEFAULTS, ...raw };
  } catch {}
  return { ...CALIB_DEFAULTS };
}
function applyCalibration(c) {
  const s = document.documentElement.style;
  s.setProperty("--tail-x", c.tailX);
  s.setProperty("--tail-y", c.tailY);
}
let calib = loadCalibration();
applyCalibration(calib);

// ──────────────────────────── Tail wiring ───────────────────────
let pettingStopTimer = null;
function startPettingVisual() {
  clearTimeout(pettingStopTimer); pettingStopTimer = null;
  dogWrap.classList.add("petting");
}
function schedulePettingStop() {
  clearTimeout(pettingStopTimer);
  pettingStopTimer = setTimeout(() => {
    dogWrap.classList.remove("petting");
    pettingStopTimer = null;
  }, TAIL_GRACE_MS);
}

// ──────────────────────────── Growl / idle warning ──────────────
let isWarning = false;
function setDogImage(kind) {
  // kind: "happy" | "bite" | "growl"
  const srcMap = { happy: dogHappySrc, bite: dogBiteSrc, growl: dogGrowlSrc };
  const availMap = { happy: dogHappyAvailable, bite: dogBiteAvailable, growl: dogGrowlAvailable };
  const emojiMap = { happy: "🐕", bite: "😠", growl: "🐺" };
  if (dogEl.tagName === "IMG" && dogHappyAvailable && availMap[kind]) {
    dogEl.src = srcMap[kind];
  } else if (!dogHappyAvailable) {
    dogEl.textContent = emojiMap[kind];
  }
  // If happy img exists but the variant is missing, leave the current image.
}
function enterWarning() {
  if (isWarning || state !== "playing") return;
  isWarning = true;
  setDogImage("growl");
  startGrowl();
  setFeedback("The dog is growling…", "warn");
}
function exitWarning() {
  if (!isWarning) return;
  isWarning = false;
  hardStopGrowl();
  setDogImage("happy");
}

// ──────────────────────────── Game state ────────────────────────
let state = "playing"; // "playing" | "over"
let calibrating = false;
let score = 0;
let best = +localStorage.getItem("dogNut.best") || 0;
let mood = MOOD_START;
let lastStrokeEndedAt = performance.now();

function renderStats() {
  scoreEl.textContent = score;
  bestEl.textContent = best;
  const hearts = Math.max(0, Math.round(mood / 20));
  moodEl.textContent = "♥".repeat(hearts) + "♡".repeat(5 - hearts);
  moodEl.style.color = mood >= 60 ? "var(--good)" : mood >= 30 ? "var(--warn)" : "var(--bad)";
}
renderStats();

function setFeedback(text, tone) {
  feedbackEl.textContent = text;
  feedbackEl.className = "";
  if (tone) feedbackEl.classList.add(tone);
}

function flashPulse(className) {
  dogWrap.classList.add(className);
  setTimeout(() => dogWrap.classList.remove(className), 180);
}

// ──────────────────────────── Stroke tracking ───────────────────
let strokeActive = false;
let strokeStartedAt = 0;
let strokeDistance = 0;
let strokePeakSpeed = 0;
let lastSamplePos = null;
let lastSampleTime = 0;

function resetStroke(x, y, t) {
  strokeActive = true;
  strokeStartedAt = t;
  strokeDistance = 0;
  strokePeakSpeed = 0;
  lastSamplePos = { x, y };
  lastSampleTime = t;
}

function sampleMove(x, y, t) {
  if (!strokeActive || !lastSamplePos) return;
  const dx = x - lastSamplePos.x;
  const dy = y - lastSamplePos.y;
  const d = Math.hypot(dx, dy);
  const dt = Math.max(1, t - lastSampleTime);
  strokeDistance += d;
  const inst = (d / dt) * 1000; // px/sec
  if (inst > strokePeakSpeed) strokePeakSpeed = inst;
  lastSamplePos = { x, y };
  lastSampleTime = t;
}

function finalizeStroke(t) {
  if (!strokeActive) return;
  strokeActive = false;
  lastStrokeEndedAt = t;
  const duration = Math.max(1, t - strokeStartedAt);
  const avgSpeed = (strokeDistance / duration) * 1000; // px/sec

  let band = SPEED_BANDS.find(b => avgSpeed < b.max);
  if (strokePeakSpeed > PEAK_FRANTIC) band = SPEED_BANDS[SPEED_BANDS.length - 1];

  const moodBonus = band.points >= 10 ? Math.floor(mood / 20) : 0;
  const gained = band.points + moodBonus;
  score += gained;

  if (band.tone === "good") {
    mood = Math.min(MOOD_MAX, mood + 5);
    flashPulse("pet-pulse");
  } else if (band.tone === "bad") {
    mood = Math.max(MOOD_MIN, mood - 10);
    flashPulse("bad-pulse");
  } else if (band.tone === "warn" && avgSpeed < 100) {
    mood = Math.max(MOOD_MIN, mood - 2);
  }

  const moodMultiplier = 1 + (BITE_MOOD_FACTOR - 1) * ((MOOD_MAX - mood) / MOOD_MAX);
  const biteChance = band.bite * moodMultiplier;

  setFeedback(`${band.label}  +${gained}${moodBonus ? ` (mood +${moodBonus})` : ""}`, band.tone);
  renderStats();
  scheduleStopPetLoop();
  schedulePettingStop();

  if (Math.random() < biteChance) {
    triggerBite(avgSpeed > 1500 ? "You were too rough. The dog bit you!" : "The dog got annoyed and bit you!");
  }
}

// ──────────────────────────── Pointer handlers ─────────────────
dogWrap.addEventListener("pointerdown", (e) => {
  if (state !== "playing" || calibrating) return;
  e.preventDefault();
  dogWrap.setPointerCapture(e.pointerId);
  const rect = dogWrap.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  resetStroke(x, y, performance.now());
  if (isWarning) exitWarning();
  startPetLoop();
  startPettingVisual();
});
dogWrap.addEventListener("pointermove", (e) => {
  if (state !== "playing" || !strokeActive) return;
  e.preventDefault();
  const rect = dogWrap.getBoundingClientRect();
  sampleMove(e.clientX - rect.left, e.clientY - rect.top, performance.now());
}, { passive: false });
function endStroke(e) {
  if (!strokeActive) return;
  try { dogWrap.releasePointerCapture(e.pointerId); } catch {}
  finalizeStroke(performance.now());
}
dogWrap.addEventListener("pointerup", endStroke);
dogWrap.addEventListener("pointercancel", endStroke);
dogWrap.addEventListener("pointerleave", (e) => {
  // pointer capture keeps us tracking; only end on real up/cancel
});

// ──────────────────────────── Idle monitor ─────────────────────
const idleTimer = setInterval(() => {
  if (state !== "playing" || strokeActive || calibrating) return;
  const idle = performance.now() - lastStrokeEndedAt;
  if (idle > IDLE_BITE_MS) {
    triggerBite("You stopped petting. The dog is offended!");
    return;
  }
  if (idle > IDLE_WARN_MS) {
    if (!isWarning) enterWarning();
    if (mood > MOOD_MIN) {
      mood = Math.max(MOOD_MIN, mood - 1);
      renderStats();
    }
  }
}, 250);

// ──────────────────────────── Bite / game over ─────────────────
function triggerBite(reason) {
  if (state !== "playing") return;
  state = "over";
  strokeActive = false;
  isWarning = false;
  hardStopPetLoop();
  hardStopGrowl();
  playBiteSfx();

  setDogImage("bite");

  clearTimeout(pettingStopTimer); pettingStopTimer = null;
  dogWrap.classList.remove("petting");
  dogWrap.classList.add("game-over");
  dogWrap.classList.add("shake");
  setTimeout(() => dogWrap.classList.remove("shake"), 450);

  if (score > best) {
    best = score;
    localStorage.setItem("dogNut.best", String(best));
  }
  setTimeout(() => {
    overlayReason.textContent = reason;
    finalScoreEl.textContent = score;
    overlayBestEl.textContent = best;
    overlay.classList.add("visible");
  }, BITE_HOLD_MS);
}

playAgainBtn.addEventListener("click", () => {
  overlay.classList.remove("visible");
  state = "playing";
  score = 0;
  mood = MOOD_START;
  lastStrokeEndedAt = performance.now();
  isWarning = false;
  hardStopGrowl();
  setDogImage("happy");
  dogWrap.classList.remove("game-over", "petting");
  renderStats();
  setFeedback("Press and drag across the dog to pet.", null);
});

// ──────────────────────────── Calibration mode ─────────────────
let preCalibSnapshot = null;

function enterCalibration() {
  if (calibrating) return;
  calibrating = true;
  preCalibSnapshot = { ...calib };
  dogWrap.classList.add("calibrating");
  dogWrap.classList.add("petting"); // show tail live
  calibTailMarker.hidden = false;
  calibBar.classList.add("visible");
  calibHint.classList.add("visible");
  calibBtn.classList.add("active");
  hardStopPetLoop();
  hardStopGrowl();
}
function exitCalibration() {
  if (!calibrating) return;
  calibrating = false;
  dogWrap.classList.remove("calibrating");
  dogWrap.classList.remove("petting");
  calibTailMarker.hidden = true;
  calibBar.classList.remove("visible");
  calibHint.classList.remove("visible");
  calibBtn.classList.remove("active");
  preCalibSnapshot = null;
  // Reset idle timer so player isn't instantly bitten after calibration
  lastStrokeEndedAt = performance.now();
}

function setupMarkerDrag(markerEl, xKey, yKey, xVar, yVar) {
  let dragging = false;
  markerEl.addEventListener("pointerdown", (e) => {
    e.stopPropagation(); e.preventDefault();
    dragging = true;
    markerEl.setPointerCapture(e.pointerId);
  });
  markerEl.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    e.preventDefault();
    const rect = dogWrap.getBoundingClientRect();
    const nx = Math.max(-0.1, Math.min(1.1, (e.clientX - rect.left) / rect.width));
    const ny = Math.max(-0.1, Math.min(1.1, (e.clientY - rect.top) / rect.height));
    calib[xKey] = nx;
    calib[yKey] = ny;
    document.documentElement.style.setProperty(xVar, nx);
    document.documentElement.style.setProperty(yVar, ny);
  }, { passive: false });
  const end = (e) => {
    if (!dragging) return;
    dragging = false;
    try { markerEl.releasePointerCapture(e.pointerId); } catch {}
  };
  markerEl.addEventListener("pointerup", end);
  markerEl.addEventListener("pointercancel", end);
}
setupMarkerDrag(calibTailMarker, "tailX", "tailY", "--tail-x", "--tail-y");

calibBtn.addEventListener("click", () => {
  if (calibrating) exitCalibration();
  else enterCalibration();
});
calibSaveBtn.addEventListener("click", () => {
  localStorage.setItem("dogNut.calib", JSON.stringify(calib));
  exitCalibration();
});
calibCancelBtn.addEventListener("click", () => {
  if (preCalibSnapshot) { calib = { ...preCalibSnapshot }; applyCalibration(calib); }
  exitCalibration();
});
calibResetBtn.addEventListener("click", () => {
  calib = { ...CALIB_DEFAULTS };
  applyCalibration(calib);
});
</script>
</body>
